<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1B5E20">
  <title>오프라인 - 착한주유소</title>
  <link rel="icon" type="image/png" href="icon-32.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
      background: linear-gradient(135deg, #F1F8E9 0%, #DCEDC8 100%);
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: linear-gradient(135deg, #0E1A0E 0%, #1B2A1B 100%); color: #F0F0F0; }
      .card { background: #1F2A1F !important; }
      .title { color: #A5D6A7 !important; }
      .desc { color: #BDBDBD !important; }
      .tip { background: #243024 !important; color: #C8E6C9 !important; }
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(27, 94, 32, 0.15);
    }
    .icon {
      font-size: 72px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      color: #1B5E20;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 14px;
      color: #546E7A;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(27, 94, 32, 0.3);
      transition: transform 0.2s;
      text-decoration: none;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.96); }
    .tip {
      margin-top: 20px;
      padding: 12px 16px;
      background: #F1F8E9;
      border-radius: 12px;
      font-size: 12px;
      color: #2E7D32;
      line-height: 1.5;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D32F2F;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="icon">📡</div>
      <div class="title">인터넷 연결 끊김</div>
      <div class="desc">
        <span class="status-dot"></span>오프라인 상태입니다<br>
        Wi-Fi 또는 모바일 데이터를 확인해 주세요
      </div>
      <button class="btn" onclick="retry()">🔄 다시 시도</button>
      <div class="tip">
        💡 캐시된 마지막 데이터로<br>최근 검색 결과를 볼 수 있습니다
      </div>
    </div>
  </div>
  <script>
    function retry() {
      if (navigator.onLine) {
        location.href = './index.html';
      } else {
        const btn = document.querySelector('.btn');
        const orig = btn.textContent;
        btn.textContent = '❌ 아직 오프라인';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      }
    }
    // 온라인 복귀 시 자동 리다이렉트
    window.addEventListener('online', () => {
      setTimeout(() => location.href = './index.html', 500);
    });
  </script>
</body>
</html>
